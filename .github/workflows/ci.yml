name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Re-vendor the schema for the Renovate-pinned Weaver tag and fail if it
      # drifts from what's committed, so a version bump can't merge un-synced.
      - name: Vendored schema is in sync
        run: |
          pnpm sync-schema
          git diff --exit-code -- server/src/schema/semconv.schema.v2.json

      - name: Gate (typecheck, lint, format, spell, unit tests)
        run: pnpm test

      - name: Integration tests
        run: xvfb-run -a pnpm test:integration

  # Validate the test-fixture registry with the pinned Weaver release (run via
  # its Docker image), so the fixtures stay valid definition/2 semconv as the
  # vendored schema's Weaver version moves.
  registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc

      - name: Validate test registry with Weaver
        run: node scripts/check-registry.mjs
