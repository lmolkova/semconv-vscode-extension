name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Re-vendor the schemas for the Renovate-pinned Weaver tag and fail if they
      # drift from what's committed, so a version bump can't merge un-synced.
      - name: Vendored schemas are in sync
        run: |
          pnpm sync-schema
          git diff --exit-code -- server/src/schema/

      - name: Gate (typecheck, lint, format, spell, unit tests)
        run: pnpm test

      - name: Integration tests
        run: xvfb-run -a pnpm test:integration

  # Validate the test-fixture registry with the pinned Weaver release (run via
  # its Docker image), so the fixtures stay valid definition/2 semconv as the
  # vendored schema's Weaver version moves.
  registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc

      - name: Validate test registry with Weaver
        run: node scripts/check-registry.mjs

  # Regenerate the fixture docs (registry attribute pages + the weaver snippet
  # tables in the hand-written signal docs) and fail if the committed output is
  # stale, so a fixture or template change can't merge without refreshed docs.
  #
  # TEMPORARILY DISABLED: the templates are no longer vendored here; they are
  # consumed remotely from open-telemetry/opentelemetry-weaver-packages. Full
  # regeneration depends on two unreleased fixes:
  #   1. weaver: `update-markdown` no longer requiring a `registry/` dir.
  #   2. weaver-packages: the markdown package + the `attributes_only.md.j2`
  #      template reachable on a published ref.
  # Re-enable (remove `if: false`) once both have shipped and TEMPLATES_REF in
  # the Makefile points at a released ref.
  generated-docs:
    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Regenerate fixture docs
        run: make generate

      - name: Check committed docs are up to date
        run: |
          if ! git diff --exit-code -- test/fixtures/docs; then
            echo "FAIL: generated fixture docs are out of date. Run 'make generate' and commit the result."
            exit 1
          fi
          untracked=$(git ls-files --others --exclude-standard -- test/fixtures/docs)
          if [ -n "$untracked" ]; then
            echo "FAIL: untracked generated docs under test/fixtures/docs:"
            echo "$untracked"
            exit 1
          fi
          echo "OK: committed fixture docs are up to date"
