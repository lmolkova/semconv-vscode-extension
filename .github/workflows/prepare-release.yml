name: Prepare release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.1)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: prepare-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Bump version and update changelog
        run: node scripts/prepare-release.mjs "$VERSION"

      - name: Format
        run: pnpm format

      - name: Open pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${VERSION#v}"
          branch="release/v$version"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git commit -am "Prepare release v$version"
          git push --force-with-lease origin "$branch"
          gh pr create \
            --base main --head "$branch" \
            --title "Prepare release v$version" \
            --body "Automated version bump and changelog roll-up for v$version. After merging, run the **Release** workflow with tag \`v$version\`."
