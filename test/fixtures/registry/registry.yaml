file_format: definition/2
attributes:
  - key: gen_ai.provider.name
    type:
      members:
        - id: openai
          stability: development
          value: "openai"
          brief: '[OpenAI](https://openai.com/)'
        - id: anthropic
          stability: development
          value: "anthropic"
          brief: '[Anthropic](https://www.anthropic.com/)'
    stability: development
    brief: The Generative AI provider as identified by the client or server instrumentation.
  - key: gen_ai.agent.id
    type: string
    stability: development
    brief: The unique identifier of the GenAI agent.
  - key: gen_ai.operation.name
    type: string
    stability: development
    brief: The name of the operation being performed.
  - key: gen_ai.request.model
    type: string
    stability: development
    brief: The name of the GenAI model a request is being made to.
    examples: ["gpt-4"]
  - key: gen_ai.response.model
    type: string
    stability: development
    brief: The name of the model that generated the response.
    examples: ["gpt-4-0613"]
  - key: gen_ai.token.type
    type:
      members:
        - id: input
          stability: development
          value: "input"
          brief: Input tokens (prompt, input, etc.).
        - id: output
          stability: development
          value: "output"
          brief: Output tokens (completion, response, etc.).
    stability: development
    brief: The type of token being counted.
  - key: gen_ai.usage.input_tokens
    type: int
    stability: development
    brief: The number of tokens used in the GenAI input (prompt).
    examples: [100]
  - key: gen_ai.usage.output_tokens
    type: int
    stability: development
    brief: The number of tokens used in the GenAI response (completion).
    examples: [180]
  - key: gen_ai.evaluation.name
    type: string
    stability: development
    brief: The name of the evaluation metric used for the GenAI response.
    examples: ["relevance", "groundedness"]
  - key: error.type
    type:
      members:
        - id: other
          stability: stable
          value: "_OTHER"
          brief: A fallback error value to be used when the instrumentation doesn't define a custom value.
    stability: stable
    brief: Describes a class of error the operation ended with.
    examples: ["timeout", "java.net.UnknownHostException", "500"]
  - key: server.address
    type: string
    stability: stable
    brief: Server domain name, IP address or Unix domain socket name.
  - key: server.port
    type: int
    stability: stable
    brief: Server port number.
